<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Daily Love</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#EC4899">

  <!-- 🔥 FAVICON -->
  <link rel="icon" href="Daily L.png" type="image/png">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="Daily L.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Love">
</head>
<body class="min-h-screen flex">

  <!-- IZQUIERDA -->
  <div class="hidden md:flex w-1/2">
    <img src="portadaCel.png" class="object-cover w-full h-full" alt="Fondo romántico">
  </div>

  <!-- DERECHA -->
  <div class="flex-1 flex flex-col bg-white p-10">
    <!-- Botón regresar -->
    <div>
      <a href="index.html"
        class="inline-flex items-center gap-2 text-pink-500 hover:text-pink-700 font-medium text-sm transition hover:-translate-x-1 transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Regresar
      </a>
    </div>
    <div class="flex-1 flex items-center justify-center">
    <div class="w-full max-w-md">

      <!-- REGISTRO -->
      <div id="registerForm" class="hidden flex-col gap-4">

        <h2 class="text-3xl font-bold text-pink-600 text-center">
          Crea tu cuenta 💖
        </h2>

        <input type="text" id="usuario" placeholder="Usuario"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

        <input type="email" id="email" placeholder="Correo"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

        <input type="password" id="password" placeholder="Contraseña"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

        <!-- GÉNERO -->
        <div class="flex gap-4 mt-2">
          <button type="button" id="btnHombre"
            class="flex-1 px-4 py-2 bg-blue-100 text-blue-600 rounded-lg transition hover:bg-blue-500 hover:text-white">
            ♂️ Hombre
          </button>
          <button type="button" id="btnMujer"
            class="flex-1 px-4 py-2 bg-pink-100 text-pink-600 rounded-lg transition hover:bg-pink-500 hover:text-white">
            ♀️ Mujer
          </button>
        </div>

        <!-- CODIGO -->
        <div class="mt-2">
          <label class="text-sm text-gray-600 mb-1 block">
            Conéctate con tu pareja 💖
          </label>
          <div class="relative">
            <input type="text" id="codigo"
              placeholder="Escribe o genera tu código"
              class="w-full px-4 py-2 pr-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">
            <button type="button" id="btnGenerar"
              class="absolute right-2 inset-y-0 my-auto h-fit text-gray-500 hover:text-pink-500">
              🎲
            </button>
          </div>
          <p id="codigoMsg" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <button type="button" id="btnRegistrar"
          class="mt-2 px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition">
          Registrar
        </button>

        <p class="text-center text-gray-600 mt-2">
          ¿Ya tienes cuenta?
          <button type="button" id="btnLogin" class="text-pink-500 font-semibold hover:underline">
            Iniciar sesión
          </button>
        </p>

      </div>

      <!-- LOGIN -->
      <div id="loginForm" class="flex flex-col gap-4 mt-6">

        <h2 class="text-3xl font-bold text-pink-600 text-center">
          Iniciar Sesión 💖
        </h2>

        <input type="email" id="loginEmail" placeholder="Correo"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

        <input type="password" id="loginPassword" placeholder="Contraseña"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

        <!-- ¿Olvidaste tu contraseña? -->
        <div class="text-right -mt-2">
          <button type="button" id="btnOlvidePassword"
            class="text-sm text-pink-400 hover:text-pink-600 hover:underline transition">
            ¿Olvidaste tu contraseña?
          </button>
        </div>

        <button type="button" id="btnIniciar"
          class="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition">
          Iniciar Sesión
        </button>

        <p class="text-center text-gray-600">
          ¿No tienes cuenta?
          <button type="button" id="btnRegister" class="text-pink-500 font-semibold hover:underline">
            Registrarse
          </button>
        </p>

      </div>

    </div>
    </div>

    <!-- FOOTER del panel -->
    <div class="pt-4 border-t border-pink-100">
      <p class="text-gray-400 text-sm text-center">
        Creado con ❤️ para Wendy | Daily Love 2026
      </p>
    </div>

  </div>

  <!-- ===== MODAL RECUPERAR CONTRASEÑA ===== -->
  <div id="modalRecuperar" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-4 flex flex-col gap-4">

      <h3 class="text-2xl font-bold text-pink-600 text-center">Recuperar contraseña 💌</h3>
      <p class="text-sm text-gray-500 text-center">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <input type="email" id="recuperarEmail" placeholder="Tu correo"
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">

      <button type="button" id="btnEnviarRecuperar"
        class="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition">
        Enviar enlace
      </button>

      <button type="button" id="btnCerrarModal"
        class="text-sm text-gray-400 hover:text-gray-600 text-center hover:underline transition">
        Cancelar
      </button>

    </div>
  </div>

  <script type="module" src="js/registro.js"></script>
  <script type="module" src="js/registroFirebase.js"></script>

</body>
</html>
