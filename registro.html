<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Daily Love</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EC4899">
   <!-- PWA en iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Love">
<!-- Icono para iPhone -->
<link rel="apple-touch-icon" href="DailyLoveN.png">
</head>
<body class="min-h-screen flex">
 

  <!-- IZQUIERDA -->
  <div class="hidden md:flex w-1/2">
    <img
      src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80"
      class="object-cover w-full h-full"
      alt="Fondo romántico">
  </div>

  <!-- DERECHA -->
  <div class="flex-1 flex items-center justify-center bg-white p-10">
    <div class="w-full max-w-md">

      <!-- REGISTRO -->
      <div id="registerForm" class="flex flex-col gap-4">

        <h2 class="text-3xl font-bold text-pink-600 text-center">
          Crea tu cuenta 💖
        </h2>

        <input type="text" id="usuario" placeholder="Usuario"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300" required>

        <input type="email" id="email" placeholder="Correo"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300" required>

        <input type="password" id="password" placeholder="Contraseña"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300" required>

        <!-- ROLES -->
        <div class="flex gap-4 mt-2">
          <button type="button" id="rolEnviara"
            class="flex-1 px-4 py-2 bg-pink-100 text-pink-600 rounded-lg transition hover:bg-pink-500 hover:text-white">
            Enviará
          </button>
          <button type="button" id="rolVera"
            class="flex-1 px-4 py-2 bg-pink-100 text-pink-600 rounded-lg transition hover:bg-pink-500 hover:text-white">
            Verá
          </button>
        </div>

        <!-- CODIGO -->
        <div id="codigoDiv" class="hidden mt-2">
          <label class="text-sm text-gray-600 mb-1 block">
            Conéctate con tu pareja 💖
          </label>
          <div class="relative">
            <input type="text" id="codigo"
              placeholder="Escribe tu código o genéralo"
              class="w-full px-4 py-2 pr-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">
            <button type="button" id="btnGenerar"
              class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-pink-500">
              🎲
            </button>
          </div>
          <p id="codigoMsg" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <button type="button" id="btnRegistrar"
          class="mt-2 px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition">
          Registrar
        </button>

        <button type="button" id="btnGoogle"
          class="w-full px-4 py-2 bg-white border rounded-lg hover:bg-gray-100 flex items-center justify-center gap-2 transition">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google">
          Continuar con Google
        </button>

        <p class="text-center text-gray-600 mt-2">
          ¿Ya tienes cuenta?
          <button type="button" id="btnLogin" class="text-pink-500 font-semibold hover:underline">
            Iniciar sesión
          </button>
        </p>

      </div>

      <!-- LOGIN -->
      <div id="loginForm" class="hidden flex-col gap-4 mt-6">

        <h2 class="text-3xl font-bold text-pink-600 text-center">
          Iniciar Sesión 💖
        </h2>

        <input type="email" id="loginEmail" placeholder="Correo"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300" required>

        <input type="password" id="loginPassword" placeholder="Contraseña"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300" required>

        <button type="button" id="btnIniciar"
          class="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 transition">
          Iniciar Sesión
        </button>

        <p class="text-center text-gray-600">
          ¿No tienes cuenta?
          <button type="button" id="btnRegister" class="text-pink-500 font-semibold hover:underline">
            Registrarse
          </button>
        </p>

      </div>

    </div>
  </div>

  <script src="js/registro.js"></script>
  <script type="module" src="js/registroFirebase.js"></script>

</body>
</html>
