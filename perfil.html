<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Daily Love</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <meta name="theme-color" content="#EC4899">
  <link rel="icon" href="Daily L.png" type="image/png">
</head>

<body class="bg-pink-50 min-h-screen font-sans">

<!-- HEADER -->
<header class="bg-white shadow-md py-4 px-6 flex items-center relative">
  <button onclick="history.back()"
    class="px-2 py-1 bg-pink-100 text-pink-600 rounded-lg hover:bg-pink-200 transition">
    ←
  </button>

  <h1 class="absolute left-1/2 -translate-x-1/2 text-2xl font-bold text-pink-600">
    Perfil
  </h1>
</header>

<!-- CONTENIDO -->
<main class="p-6 max-w-md mx-auto">

  <div class="bg-white shadow-lg rounded-2xl p-6 text-center">

    <!-- FOTO -->
    <div class="flex flex-col items-center mb-4">
      <img id="fotoPerfil"
        class="w-28 h-28 rounded-full object-cover border-4 border-pink-400 shadow">
    </div>

    <!-- NOMBRE -->
    <h2 id="nombrePerfil" class="text-xl font-bold text-pink-600 mb-1"></h2>

    <!-- CORREO -->
    <p id="correoPerfil" class="text-gray-500 text-sm mb-6"></p>

    <!-- CONTRASEÑA FAKE -->
    <div class="flex items-center justify-center gap-2 mb-6">
      <span class="text-gray-700 font-mono tracking-widest">••••••••</span>

      <button id="btnEditarPassword"
        class="text-pink-500 hover:scale-110 transition text-xl">
        ✏️
      </button>
    </div>

    <!-- BOTÓN CERRAR -->
    <button id="btnCerrarSesionPerfil"
      class="w-full border border-red-300 text-red-500 py-2 rounded-lg hover:bg-red-50 transition">
      Cerrar sesión
    </button>

  </div>

</main>

<!-- MODAL PASSWORD -->
<div id="modalPassword"
  class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-2xl p-6 w-[90%] max-w-sm shadow-xl text-center">

    <h2 class="text-lg font-bold text-pink-600 mb-4">
      Cambiar contraseña
    </h2>

    <input id="inputPasswordActual"
      type="password"
      placeholder="Contraseña actual"
      class="w-full border rounded p-2 mb-3 text-center">

    <input id="inputPasswordNueva"
      type="password"
      placeholder="Nueva contraseña"
      class="w-full border rounded p-2 mb-4 text-center">

    <p id="errorPassword" class="text-red-500 text-sm hidden mb-3">
      Contraseña incorrecta
    </p>

    <div class="flex gap-2">
      <button id="btnConfirmarPassword"
        class="flex-1 border border-green-300 text-green-600 py-2 rounded-lg hover:bg-green-50">
        Guardar
      </button>

      <button id="btnCancelarPassword"
        class="flex-1 border border-red-300 text-red-500 py-2 rounded-lg hover:bg-red-50">
        Cancelar
      </button>
    </div>

  </div>
</div>

<script type="module" src="js/perfil.js"></script>

</body>
</html>
